services:
    postgres:
        image: docker.io/postgres:15
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password
            POSTGRES_DB: keycloak
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
            # Injeta o script para criar o banco do laravel_db
            - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    keycloak:
        image: quay.io/keycloak/keycloak:latest
        environment:
            KEYCLOAK_ADMIN: admin
            KEYCLOAK_ADMIN_PASSWORD: admin
            KC_DB: postgres
            KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
            KC_DB_USERNAME: postgres
            KC_DB_PASSWORD: password
            KC_HOSTNAME: auth.test
            KC_PROXY_HEADERS: xforwarded
            KC_HTTP_ENABLED: 'true'
        depends_on:
            - postgres
        command: start-dev
        volumes:
            - ./keycloak/keycloak-theme:/opt/keycloak/themes
        ports:
            - '8080:8080' # Exposto para que o host-gateway do Laravel consiga aceder

    tailwind_builder:
        image: docker.io/node:20-alpine
        working_dir: /app
        tty: true
        stdin_open: true
        volumes:
            - ./keycloak/keycloak-theme:/app
        command: sh -c "npm install && npm run watch"

    # PHP-FPM (Processamento PHP)
    app:
        build:
            context: .
            dockerfile: podman/php/Dockerfile
        restart: unless-stopped
        userns_mode: keep-id
        working_dir: /var/www/html
        volumes:
            - .:/var/www/html
        environment:
            - DB_CONNECTION=pgsql
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_DATABASE=laravel_db
            - DB_USERNAME=postgres
            - DB_PASSWORD=password
            - TZ=America/Sao_Paulo
        depends_on:
            - postgres
        # Expondo a porta do Vite para o Vue/Inertia funcionar com HMR
        ports:
            - '5173:5173'
        extra_hosts:
            - 'auth.test:host-gateway'

    # Nginx (Servidor Web)
    web:
        image: docker.io/library/nginx:alpine
        restart: unless-stopped
        ports:
            - '80:80'
        volumes:
            - .:/var/www/html:Z
            - ./podman/nginx/default.conf:/etc/nginx/conf.d/default.conf:Z
        depends_on:
            - app

volumes:
    postgres_data:
